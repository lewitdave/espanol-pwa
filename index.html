<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0078d4">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanischer Verbtrainer – Präsens</title>
  <style>
    * {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
}

    body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100%;
  padding: 16px;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

#modeButton {
  background: #e0e0e0;
  color: #333;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
  margin-top: 24px;  
  position: sticky;
  top: env(safe-area-inset-top);

}

#question {
  font-size: 28px;
  margin-bottom: 8px;
}

.meta {
  font-size: 18px;
  margin-bottom: 20px;
  color: #555;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 8px;
  margin-top: 15px;
}

button {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  background: #0078d4;
  color: white;
  border: none;
}

#feedback {
  font-size: 18px;
  margin-top: 16px;
}

.correct {
  color: green;
  font-weight: bold;
}

.wrong {
  color: red;
  font-weight: bold;
}

#tenseButtons {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

#tenseButtons button {
  flex: 1;
  background: #f0f0f0;
  color: #333;
  font-size: 14px;
}

#tenseButtons button.active {
  background: #0078d4;
  color: white;
}

/* Mini-Link unter dem Verb */
#showTableBtn {
  background: none;
  border: none;
  color: #777;
  font-size: 13px;
  margin-top: 4px;
  padding: 0;
  text-align: left;
}

#showTableBtn:hover {
  text-decoration: underline;
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: env(safe-area-inset-top);
  z-index: 1000;
}

.overlay.hidden {
  display: none;
}

.overlayContent {
  background: white;
  width: 100%;
  max-width: 480px;
  margin-top: calc(env(safe-area-inset-top) + 40px);
  padding: 20px;
  border-radius: 16px;
}

.closeOverlay {
  background: none;
  border: none;
  font-size: 20px;
  float: right;
}

/* Tabelle */
.verbTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  font-size: 14px;
}

.verbTable th,
.verbTable td {
  border: 1px solid #ddd;
  padding: 6px;
}

/* Unregelmäßige Teile */
.irregular {
  color: #d00000;
  font-weight: bold;
}

  </style>
</head>
<body>

<div class="card">
  <div class="meta" id="meta"></div>
  <h2 id="question"></h2>

  <button id="showTableBtn" onclick="openVerbTable()">
  📋 Formen anzeigen
</button>
  
<input
  type="text"
  id="answer"
  placeholder="Konjugation eingeben"
  onkeydown="if(event.key === 'Enter') checkAnswer();"

  autocapitalize="none"
  autocorrect="off"
  autocomplete="off"
  spellcheck="false"
  inputmode="text"
/>
<div id="tenseButtons">
  <button onclick="setTense('presente')">Gegenwart</button>
  <button onclick="setTense('preterito')">Vergangenheit</button>
  <button onclick="setTense('futuro')">Zukunft</button>
</div>

<button id="modeButton" onclick="toggleMode()">
  Modus: Ein Verb komplett
</button>
 
  <div id="feedback"></div>
</div>

<script>
let verbs = [];

let activeTense = "presente";
 
const tenseLabels = {
  presente: "Gegenwart",
  preterito: "Vergangenheit",
  futuro: "Zukunft"
};

let currentVerb;

let currentForm;

let mode = "singleVerb";
// mögliche Werte: "random", "singleVerb"

let currentVerbIndex = 0;
let currentFormIndex = 0;


function getURLParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    set: params.get("set") || "verben",
    tense: params.get("tense") || "presente"
  };
}

  function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

async function loadVerbs() {
  const { set, tense } = getURLParams();
  activeTense = tense;
  document.title = `Spanisch – ${tenseLabels[activeTense] || activeTense}`;
  const filePath = `data/${set}.json`;

  try {
    const response = await fetch(filePath);
    if (!response.ok) {
      throw new Error("JSON-Datei nicht gefunden");
    }

    const data = await response.json();

    verbs = data
      .filter(v => v.tenses && v.tenses[tense])
      .map(v => ({
        verb: v.verb,
        translation: v.translation,
        forms: v.tenses[tense], // fürs Training
        tenses: v.tenses         // fürs Overlay
      }))
      .filter(v => v.forms.length > 0);

    // ⛔ Abbruch, wenn keine Verben vorhanden
    if (verbs.length === 0) {
      alert(`Keine Vokabeln für Zeitform: ${tense}`);
      return;
    }

    // ✅ 1️⃣ Verben einmal zufällig mischen
    shuffleArray(verbs);

    // ✅ 2️⃣ Aktive Zeitform im UI hervorheben
    updateActiveTenseButton();

    // ✅ Reset für Lernmodus
    currentVerb = null;
    currentVerbIndex = 0;
    currentFormIndex = 0;

    // ✅ Erste Aufgabe laden
    nextVocab();

  } catch (error) {
    console.error(error);
    alert("Fehler beim Laden der Vokabeln");
  }
}

function nextVocab() {

  closeVerbTable();
  
  if (mode === "singleVerb") {

    // Neues Verb wählen, wenn noch keins da ist
    // oder alle Personen durch sind
    if (!currentVerb || currentFormIndex >= currentVerb.forms.length) {
      currentVerb = verbs[currentVerbIndex % verbs.length];
      currentVerbIndex++;
      currentFormIndex = 0;
    }

    currentForm = currentVerb.forms[currentFormIndex];

  } else {
    // Zufallsmodus (optional, später nutzbar)
    currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
    currentForm = currentVerb.forms[Math.floor(Math.random() * currentVerb.forms.length)];
  }

  // Anzeige
  document.getElementById("question").textContent =
    `${currentVerb.verb} (${currentVerb.translation})`;

  document.getElementById("meta").textContent =
    `Person: ${currentForm.person} (${tenseLabels[activeTense] || activeTense})`;

  document.getElementById("answer").value = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "";
  document.getElementById("answer").focus();
}

function checkAnswer() {
  const userAnswer = document.getElementById("answer").value.trim();

  if (userAnswer.toLowerCase() === currentForm.solution.toLowerCase()) {
    document.getElementById("feedback").textContent = "✔ Richtig!";
    document.getElementById("feedback").className = "correct";

    currentFormIndex++;   // 👉 nächste Person desselben Verbs
    setTimeout(nextVocab, 500);

  } else {
    document.getElementById("feedback").textContent =
      `✘ Falsch. Richtig ist: ${currentForm.solution}`;
    document.getElementById("feedback").className = "wrong";
  }
}

function toggleMode() {
  if (mode === "singleVerb") {
    mode = "random";
    document.getElementById("modeButton").textContent =
      "Modus: Zufall";
  } else {
    mode = "singleVerb";
    document.getElementById("modeButton").textContent =
      "Modus: Ein Verb komplett";

    // Reset für systematischen Modus
    currentVerb = null;
    currentFormIndex = 0;
  }

  
if (verbs.length > 0) {
  nextVocab();
}

}

function setTense(tense) {
  const params = new URLSearchParams(window.location.search);
  params.set("tense", tense);

  // Optional: Set beibehalten
  if (!params.get("set")) {
    params.set("set", "verben");
  }

  window.location.search = params.toString();
}

  function updateActiveTenseButton() {
  const buttons = document.querySelectorAll("#tenseButtons button");

  buttons.forEach(btn => {
    btn.classList.remove("active");
  });

  const activeButton = Array.from(buttons).find(
    btn => btn.textContent.toLowerCase().includes(tenseLabels[activeTense].toLowerCase())
  );

  if (activeButton) {
    activeButton.classList.add("active");
  }
}

function openVerbTable() {
  if (!currentVerb) return;

  const container = document.getElementById("verbTableContainer");
  container.innerHTML = generateVerbTable(currentVerb);

  document.getElementById("verbOverlay").classList.remove("hidden");
}

function closeVerbTable() {
  document.getElementById("verbOverlay").classList.add("hidden");
}

function highlightIrregular(base, form) {
base = base.replace(/(se|ar|er|ir)$/, '');
  let i = 0;
  while (i < base.length && i < form.length && base[i] === form[i]) {
    i++;
  }

  return (
    form.slice(0, i) +
    "<span class='irregular'>" +
    form.slice(i) +
    "</span>"
  );
}

function generateVerbTable(verb) {
  const persons = ["yo", "tú", "él/ella", "nosotros/as", "vosotros/as", "ellos/as"];
  const tenses = ["presente", "preterito", "futuro"];

  let html = `<h3>${verb.verb} – ${verb.translation}</h3>`;
  html += "<table class='verbTable'>";

  // Tabellenkopf
  html += "<tr><th>Person</th>";
  tenses.forEach(t => {
    html += `<th>${tenseLabels[t]}</th>`;
  });
  html += "</tr>";

  // Zeilen pro Person
  persons.forEach(person => {
    html += `<tr><th>${person}</th>`;

    tenses.forEach(t => {
      const formObj = verb.tenses[t]?.find(f => f.person === person);
      const value = formObj
        ? highlightIrregular(verb.verb, formObj.solution)
        : "—";
      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";
  return html;
}

window.onload = function () {
  document.getElementById("modeButton").textContent =
    mode === "singleVerb"
      ? "Modus: Ein Verb komplett"
      : "Modus: Zufall";

  loadVerbs(); // ✅ WICHTIG: nicht nextVocab()
};



</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

<div id="verbOverlay" class="overlay hidden">
  <div class="overlayContent">
    <button class="closeOverlay" onclick="closeVerbTable()">✕</button>
    <div id="verbTableContainer"></div>
  </div>
</div>

</body>
</html>
