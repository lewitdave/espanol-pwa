<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0078d4">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanischer Verbtrainer – Präsens</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100svh;
  padding: 16px;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
}

#question {
  font-size: 28px;
  margin-bottom: 8px;
}

.meta {
  font-size: 18px;
  margin-bottom: 20px;
  color: #555;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 8px;
  margin-top: 15px;
}

button {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  background: #0078d4;
  color: white;
  border: none;
}

#feedback {
  font-size: 18px;
  margin-top: 16px;
}

.correct {
  color: green;
  font-weight: bold;
}

.wrong {
  color: red;
  font-weight: bold;
}
  </style>
</head>
<body>

<div class="card">
  <div class="meta" id="meta"></div>
  <h2 id="question"></h2>

  
<input
  type="text"
  id="answer"
  placeholder="Konjugation eingeben"
  onkeydown="if(event.key === 'Enter') checkAnswer();"
/>


  <button onclick="checkAnswer()">Antwort prüfen</button>

  <div id="feedback"></div>
</div>

<script>
const verbs = [

  {
    verb: "ir",
    translation: "gehen",
    forms: [
      { person: "yo", solution: "voy" },
      { person: "tú", solution: "vas" },
      { person: "él/ella", solution: "va" },
      { person: "nosotros/as", solution: "vamos" },
      { person: "vosotros/as", solution: "vais" },
      { person: "ellos/as", solution: "van" }
    ]
  },

  {
    verb: "hacer",
    translation: "machen",
    forms: [
      { person: "yo", solution: "hago" },
      { person: "tú", solution: "haces" },
      { person: "él/ella", solution: "hace" },
      { person: "nosotros/as", solution: "hacemos" },
      { person: "vosotros/as", solution: "hacéis" },
      { person: "ellos/as", solution: "hacen" }
    ]
  },

  {
    verb: "tener",
    translation: "haben",
    forms: [
      { person: "yo", solution: "tengo" },
      { person: "tú", solution: "tienes" },
      { person: "él/ella", solution: "tiene" },
      { person: "nosotros/as", solution: "tenemos" },
      { person: "vosotros/as", solution: "tenéis" },
      { person: "ellos/as", solution: "tienen" }
    ]
  },

  {
    verb: "ser",
    translation: "sein",
    forms: [
      { person: "yo", solution: "soy" },
      { person: "tú", solution: "eres" },
      { person: "él/ella", solution: "es" },
      { person: "nosotros/as", solution: "somos" },
      { person: "vosotros/as", solution: "sois" },
      { person: "ellos/as", solution: "son" }
    ]
  },

  {
    verb: "estar",
    translation: "sein (Zustand)",
    forms: [
      { person: "yo", solution: "estoy" },
      { person: "tú", solution: "estás" },
      { person: "él/ella", solution: "está" },
      { person: "nosotros/as", solution: "estamos" },
      { person: "vosotros/as", solution: "estáis" },
      { person: "ellos/as", solution: "están" }
    ]
  },

  {
    verb: "hablar",
    translation: "sprechen",
    forms: [
      { person: "yo", solution: "hablo" },
      { person: "tú", solution: "hablas" },
      { person: "él/ella", solution: "habla" },
      { person: "nosotros/as", solution: "hablamos" },
      { person: "vosotros/as", solution: "habláis" },
      { person: "ellos/as", solution: "hablan" }
    ]
  },

  {
    verb: "poder",
    translation: "können",
    forms: [
      { person: "yo", solution: "puedo" },
      { person: "tú", solution: "puedes" },
      { person: "él/ella", solution: "puede" },
      { person: "nosotros/as", solution: "podemos" },
      { person: "vosotros/as", solution: "podéis" },
      { person: "ellos/as", solution: "pueden" }
    ]
  },

  {
    verb: "ver",
    translation: "sehen",
    forms: [
      { person: "yo", solution: "veo" },
      { person: "tú", solution: "ves" },
      { person: "él/ella", solution: "ve" },
      { person: "nosotros/as", solution: "vemos" },
      { person: "vosotros/as", solution: "veis" },
      { person: "ellos/as", solution: "ven" }
    ]
  },

  {
    verb: "reírse",
    translation: "lachen",
    forms: [
      { person: "yo", solution: "me río" },
      { person: "tú", solution: "te ríes" },
      { person: "él/ella", solution: "se ríe" },
      { person: "nosotros/as", solution: "nos reímos" },
      { person: "vosotros/as", solution: "os reís" },
      { person: "ellos/as", solution: "se ríen" }
    ]
  },

  {
    verb: "perder",
    translation: "verlieren",
    forms: [
      { person: "yo", solution: "pierdo" },
      { person: "tú", solution: "pierdes" },
      { person: "él/ella", solution: "pierde" },
      { person: "nosotros/as", solution: "perdemos" },
      { person: "vosotros/as", solution: "perdéis" },
      { person: "ellos/as", solution: "pierden" }
    ]
  },

  {
    verb: "cantar",
    translation: "singen",
    forms: [
      { person: "yo", solution: "canto" },
      { person: "tú", solution: "cantas" },
      { person: "él/ella", solution: "canta" },
      { person: "nosotros/as", solution: "cantamos" },
      { person: "vosotros/as", solution: "cantáis" },
      { person: "ellos/as", solution: "cantan" }
    ]
  },

  {
    verb: "llorar",
    translation: "weinen",
    forms: [
      { person: "yo", solution: "lloro" },
      { person: "tú", solution: "lloras" },
      { person: "él/ella", solution: "llora" },
      { person: "nosotros/as", solution: "lloramos" },
      { person: "vosotros/as", solution: "lloráis" },
      { person: "ellos/as", solution: "lloran" }
    ]
  }

];

let currentVerb;
let currentForm;

function nextVocab() {
  // Zufälliges Verb
  currentVerb = verbs[Math.floor(Math.random() * verbs.length)];

  // Zufällige Person dieses Verbs
  currentForm = currentVerb.forms[Math.floor(Math.random() * currentVerb.forms.length)];

  // Anzeige
  document.getElementById("question").textContent =
    `${currentVerb.verb} (${currentVerb.translation})`;

  document.getElementById("meta").textContent =
    `Person: ${currentForm.person} (Präsens)`;

  document.getElementById("answer").value = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "";
  document.getElementById("answer").focus();
}

function checkAnswer() {
  const userAnswer = document.getElementById("answer").value.trim();

  if (userAnswer.toLowerCase() === currentForm.solution.toLowerCase()) {
    document.getElementById("feedback").textContent = "✔ Richtig!";
    document.getElementById("feedback").className = "correct";
    setTimeout(nextVocab, 700);
  } else {
    document.getElementById("feedback").textContent =
      `✘ Falsch. Richtig ist: ${currentForm.solution}`;
    document.getElementById("feedback").className = "wrong";
  }
}


window.onload = function () {
  nextVocab();
};

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
