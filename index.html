<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0078d4">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanischer Verbtrainer – Präsens</title>
  <style>
    * {
  box-sizing: border-box;
}
    body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100svh;
  padding: 16px;
}

#modeButton {
  background: #e0e0e0;
  color: #333;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
}

#question {
  font-size: 28px;
  margin-bottom: 8px;
}

.meta {
  font-size: 18px;
  margin-bottom: 20px;
  color: #555;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 8px;
  margin-top: 15px;
}

button {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  font-size: 18px;
  border-radius: 10px;
  background: #0078d4;
  color: white;
  border: none;
}

#feedback {
  font-size: 18px;
  margin-top: 16px;
}

.correct {
  color: green;
  font-weight: bold;
}

.wrong {
  color: red;
  font-weight: bold;
}
  </style>
</head>
<body>

<div class="card">
  <div class="meta" id="meta"></div>
  <h2 id="question"></h2>

  
<input
  type="text"
  id="answer"
  placeholder="Konjugation eingeben"
  onkeydown="if(event.key === 'Enter') checkAnswer();"
/>

<button id="modeButton" onclick="toggleMode()">
  Modus: Ein Verb komplett
</button>

  <button onclick="checkAnswer()">Antwort prüfen</button>

  <div id="feedback"></div>
</div>

<script>
let verbs = [];

let activeTense = "presente";
 
const tenseLabels = {
  presente: "Gegenwart",
  preterito: "Vergangenheit",
  futuro: "Zukunft"
};

let currentVerb;

let currentForm;

let mode = "singleVerb";
// mögliche Werte: "random", "singleVerb"

let currentVerbIndex = 0;
let currentFormIndex = 0;


function getURLParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    set: params.get("set") || "verben",
    tense: params.get("tense") || "presente"
  };
}

async function loadVerbs() {
  const { set, tense } = getURLParams();
  activeTense = tense;
  document.title = `Spanisch – ${tenseLabels[activeTense] || activeTense}`;
  const filePath = `data/${set}.json`;

  try {
    const response = await fetch(filePath);
    if (!response.ok) {
      throw new Error("JSON-Datei nicht gefunden");
    }

    const data = await response.json();

    verbs = data
      .filter(v => v.tenses && v.tenses[tense])
      .map(v => ({
        verb: v.verb,
        translation: v.translation,
        forms: v.tenses[tense]
      }))
      .filter(v => v.forms.length > 0);

    if (verbs.length === 0) {
      alert(`Keine Vokabeln für Zeitform: ${tense}`);
      return;
    }

    // Reset für Lernmodus
    currentVerb = null;
    currentVerbIndex = 0;
    currentFormIndex = 0;

    nextVocab();

  } catch (error) {
    console.error(error);
    alert("Fehler beim Laden der Vokabeln");
  }
}

function nextVocab() {

  if (mode === "singleVerb") {

    // Neues Verb wählen, wenn noch keins da ist
    // oder alle Personen durch sind
    if (!currentVerb || currentFormIndex >= currentVerb.forms.length) {
      currentVerb = verbs[currentVerbIndex % verbs.length];
      currentVerbIndex++;
      currentFormIndex = 0;
    }

    currentForm = currentVerb.forms[currentFormIndex];

  } else {
    // Zufallsmodus (optional, später nutzbar)
    currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
    currentForm = currentVerb.forms[Math.floor(Math.random() * currentVerb.forms.length)];
  }

  // Anzeige
  document.getElementById("question").textContent =
    `${currentVerb.verb} (${currentVerb.translation})`;

  document.getElementById("meta").textContent =
    `Person: ${currentForm.person} (${tenseLabels[activeTense] || activeTense})`;

  document.getElementById("answer").value = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "";
  document.getElementById("answer").focus();
}

function checkAnswer() {
  const userAnswer = document.getElementById("answer").value.trim();

  if (userAnswer.toLowerCase() === currentForm.solution.toLowerCase()) {
    document.getElementById("feedback").textContent = "✔ Richtig!";
    document.getElementById("feedback").className = "correct";

    currentFormIndex++;   // 👉 nächste Person desselben Verbs
    setTimeout(nextVocab, 500);

  } else {
    document.getElementById("feedback").textContent =
      `✘ Falsch. Richtig ist: ${currentForm.solution}`;
    document.getElementById("feedback").className = "wrong";
  }
}

function toggleMode() {
  if (mode === "singleVerb") {
    mode = "random";
    document.getElementById("modeButton").textContent =
      "Modus: Zufall";
  } else {
    mode = "singleVerb";
    document.getElementById("modeButton").textContent =
      "Modus: Ein Verb komplett";

    // Reset für systematischen Modus
    currentVerb = null;
    currentFormIndex = 0;
  }

  
if (verbs.length > 0) {
  nextVocab();
}

}


window.onload = function () {
  document.getElementById("modeButton").textContent =
    mode === "singleVerb"
      ? "Modus: Ein Verb komplett"
      : "Modus: Zufall";

  loadVerbs(); // ✅ WICHTIG: nicht nextVocab()
};



</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
